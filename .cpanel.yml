---
deployment:
  tasks:
    - export APPPATH=/home/ergun1/repositories/cPanelDevelopment_v1.0
    - export DEPLOYPATH=/home/ergun1/public_html
    - export PHP=/opt/cpanel/ea-php84/root/usr/bin/php

    - cd $APPPATH
    - echo "Deploy basladi" > deploy-debug.log
    - date >> deploy-debug.log

    - echo "Eski Laravel dosyalari temizleniyor..." >> deploy-debug.log
    - /bin/rm -rf $DEPLOYPATH/app $DEPLOYPATH/bootstrap $DEPLOYPATH/config $DEPLOYPATH/public $DEPLOYPATH/resources $DEPLOYPATH/routes $DEPLOYPATH/tests $DEPLOYPATH/vendor >> deploy-debug.log 2>&1 || true
    - /bin/rm -f $DEPLOYPATH/artisan $DEPLOYPATH/composer.json $DEPLOYPATH/composer.lock $DEPLOYPATH/package.json $DEPLOYPATH/package-lock.json $DEPLOYPATH/phpunit.xml $DEPLOYPATH/vite.config.js >> deploy-debug.log 2>&1 || true

    - echo "Dosyalar public_html icine kopyalaniyor..." >> deploy-debug.log
    - /bin/tar --exclude='.git' --exclude='.cpanel.yml' --exclude='.env' --exclude='node_modules' --exclude='database/database.sqlite' -cf - . | /bin/tar -xf - -C $DEPLOYPATH >> deploy-debug.log 2>&1

    - cd $DEPLOYPATH

    - echo "SQLite dosyasi kontrol..." >> deploy-debug.log
    - mkdir -p database
    - if [ ! -f database/database.sqlite ]; then touch database/database.sqlite; fi

    - echo "Composer kontrol ediliyor..." >> deploy-debug.log
    - if [ ! -f composer.phar ]; then /usr/bin/curl -sS https://getcomposer.org/composer-stable.phar -o composer.phar >> deploy-debug.log 2>&1 || /usr/bin/wget -q https://getcomposer.org/composer-stable.phar -O composer.phar >> deploy-debug.log 2>&1; fi

    - echo "Composer install basladi..." >> deploy-debug.log
    - $PHP composer.phar install --no-dev --prefer-dist --optimize-autoloader --no-interaction --no-scripts >> deploy-debug.log 2>&1

    - echo "Package discover..." >> deploy-debug.log
    - $PHP artisan package:discover --ansi >> deploy-debug.log 2>&1

    - echo "APP_KEY kontrol..." >> deploy-debug.log
    - if [ -f .env ] && ! grep -q "^APP_KEY=base64:" .env; then $PHP artisan key:generate --force >> deploy-debug.log 2>&1; fi

    - echo "Migrate..." >> deploy-debug.log
    - $PHP artisan migrate --force >> deploy-debug.log 2>&1

    - echo "Optimize clear..." >> deploy-debug.log
    - $PHP artisan optimize:clear >> deploy-debug.log 2>&1 || true

    - echo "Storage link..." >> deploy-debug.log
    - $PHP artisan storage:link >> deploy-debug.log 2>&1 || true

    - echo "Optimize..." >> deploy-debug.log
    - $PHP artisan optimize >> deploy-debug.log 2>&1

    - echo "Deploy bitti" >> deploy-debug.log
    - date >> deploy-debug.log
